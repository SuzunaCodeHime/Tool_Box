<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>简繁转换 - Tool Box</title>
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>文</text></svg>">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">

        <header>
            <a href="../index.html">&larr;</a>
            <h1>简繁转换</h1>
        </header>

        <div class="direction-bar">
            <span class="dir-label active" id="labelFrom">简体</span>
            <button class="swap-btn" id="swapBtn" title="切换方向">&#8646;</button>
            <span class="dir-label" id="labelTo">繁体</span>
        </div>

        <div class="panels">
            <div class="panel">
                <div class="panel-label" id="inputLabel">原文</div>
                <textarea id="input" placeholder="在此输入或粘贴文本..." spellcheck="false"></textarea>
            </div>
            <div class="panel">
                <div class="panel-label" id="outputLabel">转换结果</div>
                <textarea id="output" readonly placeholder="转换结果将在此显示..." spellcheck="false"></textarea>
            </div>
        </div>

        <div class="toolbar">
            <div class="info">
                原文 <span id="inputCount">0</span> 字 · 结果 <span id="outputCount">0</span> 字
            </div>
            <div class="btn-group">
                <button class="btn" id="copyBtn">复制结果</button>
                <button class="btn" id="clearBtn">清空</button>
            </div>
        </div>

        <footer>Tool Box &copy; 2026 &middot; SuzunaCodeHime</footer>

    </div>

    <button class="theme-toggle" id="themeToggle" title="切换主题">&#9790;</button>

    <script src="https://cdn.jsdelivr.net/npm/opencc-js@1.4.0/dist/umd/full.js"></script>
    <script src="script.js"></script>
</body>

</html>
