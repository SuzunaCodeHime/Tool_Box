<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>简繁转换 - Tool Box</title>
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>文</text></svg>">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #0f1117;
            --bg2: #1a1c25;
            --bg3: #242733;
            --text: #e1e4ed;
            --text2: #8b8fa3;
            --accent: #6c8aff;
            --accent-hover: #8aa4ff;
            --border: #2e3140;
            --radius: 10px;
        }

        body {
            font-family: -apple-system, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.6;
        }

        .container {
            max-width: 960px;
            margin: 0 auto;
            padding: 32px 20px 60px;
        }

        header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
        }

        header a {
            text-decoration: none;
            color: var(--text2);
            font-size: 20px;
            transition: color .2s;
        }

        header a:hover {
            color: var(--text);
        }

        header h1 {
            font-size: 20px;
            font-weight: 600;
        }

        .direction-bar {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 16px;
        }

        .dir-label {
            font-size: 13px;
            color: var(--text2);
            font-weight: 500;
            min-width: 48px;
            text-align: center;
        }

        .dir-label.active {
            color: var(--accent);
            font-weight: 600;
        }

        .swap-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 1px solid var(--border);
            background: var(--bg3);
            color: var(--text);
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: border-color .2s, transform .2s, background .2s;
        }

        .swap-btn:hover {
            border-color: var(--accent);
            background: var(--bg2);
            transform: rotate(180deg);
        }

        .swap-btn:active {
            transform: rotate(180deg) scale(0.9);
        }

        .panels {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .panel {
            display: flex;
            flex-direction: column;
        }

        .panel-label {
            font-size: 12px;
            color: var(--text2);
            margin-bottom: 6px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: .5px;
        }

        textarea {
            width: 100%;
            height: 320px;
            padding: 14px 16px;
            background: var(--bg2);
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            font-size: 15px;
            line-height: 1.8;
            resize: vertical;
            outline: none;
            font-family: inherit;
            transition: border-color .2s;
        }

        textarea:focus {
            border-color: var(--accent);
        }

        textarea[readonly] {
            cursor: default;
            opacity: .9;
        }

        .toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 12px 0 20px;
            flex-wrap: wrap;
            gap: 8px;
        }

        .toolbar .info {
            font-size: 12px;
            color: var(--text2);
        }

        .toolbar .info span {
            color: var(--text);
            font-weight: 600;
        }

        .btn-group {
            display: flex;
            gap: 8px;
        }

        .btn {
            padding: 6px 16px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: var(--bg3);
            color: var(--text2);
            cursor: pointer;
            font-size: 13px;
            transition: border-color .2s, color .2s, background .2s;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .btn:hover {
            border-color: var(--text2);
            color: var(--text);
        }

        .btn.accent {
            border-color: var(--accent);
            color: var(--accent);
        }

        .btn.accent:hover {
            background: var(--accent);
            color: #fff;
        }

        .btn.copied {
            border-color: #34d399;
            color: #34d399;
        }

        .theme-toggle {
            position: fixed;
            top: 16px;
            right: 16px;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 1px solid var(--border);
            background: var(--bg2);
            color: var(--text2);
            cursor: pointer;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: border-color .2s, color .2s;
            z-index: 10;
        }

        .theme-toggle:hover {
            border-color: var(--accent);
            color: var(--text);
        }

        footer {
            margin-top: 40px;
            padding-top: 16px;
            border-top: 1px solid var(--border);
            text-align: center;
            color: var(--text2);
            font-size: 12px;
        }

        @media (max-width: 640px) {
            .container {
                padding: 20px 14px 40px;
            }

            .panels {
                grid-template-columns: 1fr;
            }

            textarea {
                height: 200px;
            }

            .toolbar {
                flex-direction: column;
                align-items: flex-start;
            }
        }

        /* Light theme */
        [data-theme="light"] {
            --bg: #f5f5f7;
            --bg2: #fff;
            --bg3: #e8e8ed;
            --text: #1d1d1f;
            --text2: #6e6e73;
            --accent: #4a6cf7;
            --accent-hover: #3a5ce5;
            --border: #d2d2d7;
        }

        [data-theme="light"] body {
            background: var(--bg);
            color: var(--text);
        }

        [data-theme="light"] textarea {
            background: var(--bg2);
            color: var(--text);
            border-color: var(--border);
        }

        [data-theme="light"] .btn {
            background: var(--bg3);
            color: var(--text2);
            border-color: var(--border);
        }

        [data-theme="light"] .swap-btn {
            background: var(--bg3);
            color: var(--text);
            border-color: var(--border);
        }

        [data-theme="light"] .theme-toggle {
            background: var(--bg2);
            color: var(--text2);
            border-color: var(--border);
        }
    </style>
</head>

<body>
    <div class="container">

        <header>
            <a href="../index.html">&larr;</a>
            <h1>简繁转换</h1>
        </header>

        <div class="direction-bar">
            <span class="dir-label active" id="labelFrom">简体</span>
            <button class="swap-btn" id="swapBtn" title="切换方向">&#8646;</button>
            <span class="dir-label" id="labelTo">繁体</span>
        </div>

        <div class="panels">
            <div class="panel">
                <div class="panel-label" id="inputLabel">原文</div>
                <textarea id="input" placeholder="在此输入或粘贴文本..." spellcheck="false"></textarea>
            </div>
            <div class="panel">
                <div class="panel-label" id="outputLabel">转换结果</div>
                <textarea id="output" readonly placeholder="转换结果将在此显示..." spellcheck="false"></textarea>
            </div>
        </div>

        <div class="toolbar">
            <div class="info">
                原文 <span id="inputCount">0</span> 字 · 结果 <span id="outputCount">0</span> 字
            </div>
            <div class="btn-group">
                <button class="btn" id="copyBtn">复制结果</button>
                <button class="btn" id="clearBtn">清空</button>
            </div>
        </div>

        <footer>Tool Box &copy; 2026 &middot; SuzunaCodeHime</footer>

    </div>

    <button class="theme-toggle" id="themeToggle" title="切换主题">&#9790;</button>

    <script src="https://cdn.jsdelivr.net/npm/opencc-js@1.4.0/dist/umd/full.js"></script>
    <script>
        const input = document.getElementById('input');
        const output = document.getElementById('output');
        const inputCount = document.getElementById('inputCount');
        const outputCount = document.getElementById('outputCount');
        const copyBtn = document.getElementById('copyBtn');
        const clearBtn = document.getElementById('clearBtn');
        const swapBtn = document.getElementById('swapBtn');
        const labelFrom = document.getElementById('labelFrom');
        const labelTo = document.getElementById('labelTo');
        const inputLabel = document.getElementById('inputLabel');
        const outputLabel = document.getElementById('outputLabel');
        const themeToggle = document.getElementById('themeToggle');

        let isS2T = true;
        let converterS2T = null;
        let converterT2S = null;

        function initConverters() {
            converterS2T = OpenCC.Converter({ from: 'cn', to: 'tw' });
            converterT2S = OpenCC.Converter({ from: 'tw', to: 'cn' });
        }

        function convert() {
            const text = input.value;
            if (!text) {
                output.value = '';
                inputCount.textContent = '0';
                outputCount.textContent = '0';
                return;
            }
            const result = isS2T ? converterS2T(text) : converterT2S(text);
            output.value = result;
            inputCount.textContent = text.length;
            outputCount.textContent = result.length;
        }

        function swapDirection() {
            isS2T = !isS2T;
            labelFrom.textContent = isS2T ? '简体' : '繁体';
            labelTo.textContent = isS2T ? '繁体' : '简体';
            inputLabel.textContent = isS2T ? '简体原文' : '繁体原文';
            outputLabel.textContent = isS2T ? '繁体结果' : '简体结果';
            input.placeholder = isS2T ? '在此输入简体文本...' : '在此输入繁体文本...';
            output.placeholder = isS2T ? '繁体结果将在此显示...' : '简体结果将在此显示...';
            convert();
        }

        copyBtn.addEventListener('click', async () => {
            const text = output.value;
            if (!text) return;
            try {
                await navigator.clipboard.writeText(text);
                copyBtn.textContent = '已复制!';
                copyBtn.classList.add('copied');
                setTimeout(() => {
                    copyBtn.textContent = '复制结果';
                    copyBtn.classList.remove('copied');
                }, 1500);
            } catch {
                output.select();
                document.execCommand('copy');
                copyBtn.textContent = '已复制!';
                copyBtn.classList.add('copied');
                setTimeout(() => {
                    copyBtn.textContent = '复制结果';
                    copyBtn.classList.remove('copied');
                }, 1500);
            }
        });

        clearBtn.addEventListener('click', () => {
            input.value = '';
            output.value = '';
            inputCount.textContent = '0';
            outputCount.textContent = '0';
        });

        swapBtn.addEventListener('click', swapDirection);

        input.addEventListener('input', convert);

        // Theme
        function setTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            themeToggle.innerHTML = theme === 'light' ? '&#9790;' : '&#9788;';
            localStorage.setItem('zh-convert-theme', theme);
        }
        const savedTheme = localStorage.getItem('zh-convert-theme');
        if (savedTheme) {
            setTheme(savedTheme);
        } else if (window.matchMedia('(prefers-color-scheme: light)').matches) {
            setTheme('light');
        }
        themeToggle.addEventListener('click', () => {
            const current = document.documentElement.getAttribute('data-theme');
            setTheme(current === 'light' ? 'dark' : 'light');
        });

        initConverters();
    </script>
</body>

</html>
