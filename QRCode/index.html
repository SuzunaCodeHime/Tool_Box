<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>二维码生成 - Tool Box</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>▣</text></svg>">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
    --bg: #0f1117; --bg2: #1a1c25; --bg3: #242733;
    --text: #e1e4ed; --text2: #8b8fa3;
    --accent: #6c8aff; --accent-hover: #8aa4ff;
    --border: #2e3140; --radius: 10px; --err: #ff6b6b;
}
body {
    font-family: -apple-system, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: var(--bg); color: var(--text); min-height: 100vh; line-height: 1.6;
}

/* header */
header { display: flex; align-items: center; gap: 12px; padding: 20px 24px 16px; max-width: 960px; margin: 0 auto; }
header a { text-decoration: none; color: var(--text2); font-size: 20px; transition: color .2s; }
header a:hover { color: var(--text); }
header h1 { font-size: 20px; font-weight: 600; flex: 1; }
.header-actions { display: flex; gap: 8px; }
.header-actions button {
    width: 36px; height: 36px; border-radius: 8px; border: 1px solid var(--border);
    background: var(--bg2); color: var(--text2); font-size: 16px; cursor: pointer;
    display: flex; align-items: center; justify-content: center; transition: all .2s;
}
.header-actions button:hover { border-color: var(--accent); color: var(--text); }

/* content */
.content {
    display: flex; gap: 40px; max-width: 960px; margin: 0 auto;
    padding: 0 24px 40px; min-height: calc(100vh - 80px);
    justify-content: center;
}

/* left panel */
.left {
    width: 380px; flex-shrink: 0; overflow-y: auto;
    display: flex; flex-direction: column; gap: 14px;
    padding-right: 8px; scrollbar-width: thin; scrollbar-color: var(--border) transparent;
}
.left::-webkit-scrollbar { width: 5px; }
.left::-webkit-scrollbar-track { background: transparent; }
.left::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* right panel */
.right {
    width: 380px; flex-shrink: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center; min-width: 0;
}

/* form */
label { display: block; font-size: 13px; color: var(--text2); margin-bottom: 6px; font-weight: 500; }

textarea, input[type="text"], select {
    width: 100%; padding: 10px 14px; border-radius: 8px; border: 1px solid var(--border);
    background: var(--bg2); color: var(--text); font-size: 14px; outline: none; font-family: inherit;
    transition: border-color .2s;
}
textarea:focus, input[type="text"]:focus, select:focus { border-color: var(--accent); }
textarea { min-height: 90px; resize: vertical; line-height: 1.7; }
select { cursor: pointer; }

.form-group { margin-bottom: 2px; }
.option-row { display: flex; gap: 12px; }
.option-row > * { flex: 1; }

/* pill buttons */
.btn-group { display: flex; gap: 6px; flex-wrap: wrap; }
.pill {
    padding: 6px 16px; border-radius: 6px; border: 1px solid var(--border);
    background: var(--bg3); color: var(--text2); cursor: pointer; font-size: 13px;
    transition: all .2s;
}
.pill:hover { border-color: var(--text2); color: var(--text); }
.pill.active { border-color: var(--accent); color: var(--accent); background: rgba(108,138,255,.1); }

/* visual group (wider buttons with icons) */
.visual-group { gap: 0; }
.visual-group .pill {
    flex: 1; text-align: center; min-height: 48px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 3px; font-size: 12px;
}

.dot-icon { width: 16px; height: 16px; }
.dot-sq { background: currentColor; border-radius: 2px; }
.dot-rd { background: currentColor; border-radius: 4px; }
.dot-ci { background: currentColor; border-radius: 50%; }

/* color picker */
.color-row { display: flex; gap: 12px; }
.color-col { flex: 1; }
.color-col label { margin-bottom: 4px; }
.color-input {
    display: flex; align-items: center; gap: 10px; padding: 8px 12px;
    border-radius: 8px; border: 1px solid var(--border); background: var(--bg2);
    cursor: pointer; transition: border-color .2s;
}
.color-input:hover { border-color: var(--accent); }
.color-swatch { width: 24px; height: 24px; border-radius: 4px; border: 1px solid rgba(255,255,255,.1); flex-shrink: 0; }
.color-input span { font-size: 13px; font-family: "SF Mono", "Consolas", monospace; color: var(--text2); }
.picker { position: absolute; opacity: 0; width: 0; height: 0; pointer-events: none; }

#fg-swatch { background: #000; }
#bg-swatch { background: #fff; }
#g1-swatch { background: #667eea; }
#g2-swatch { background: #764ba2; }

.hidden { display: none; }

/* preview */
.preview-box {
    width: 100%; max-width: 380px; aspect-ratio: 1;
    border: 2px dashed var(--border); border-radius: var(--radius);
    display: flex; align-items: center; justify-content: center;
    background: var(--bg2); transition: border-color .3s;
}
.preview-box.has-qr { border-style: solid; border-color: transparent; }

#qrcode { display: flex; align-items: center; justify-content: center; }
#qrcode canvas, #qrcode img { display: block; max-width: 320px; max-height: 320px; border-radius: 6px; }
#qrcode:empty { display: none; }

.placeholder { text-align: center; color: var(--text2); font-size: 14px; line-height: 1.6; }

.error-msg { color: var(--err); font-size: 13px; text-align: center; margin-top: 8px; }

.actions { display: flex; gap: 10px; margin-top: 16px; }
.actions button {
    padding: 10px 24px; border-radius: 8px; border: none;
    font-size: 14px; font-weight: 600; cursor: pointer; transition: background .2s;
}
.actions .primary { background: var(--accent); color: #fff; }
.actions .primary:hover { background: var(--accent-hover); }
.actions .secondary { background: var(--bg3); color: var(--text); border: 1px solid var(--border); }
.actions .secondary:hover { border-color: var(--text2); }

footer { max-width: 960px; margin: 0 auto; padding: 16px 24px; border-top: 1px solid var(--border); text-align: center; color: var(--text2); font-size: 12px; }

@media (max-width: 768px) {
    .content { flex-direction: column; padding: 0 14px 30px; }
    .left { width: 100%; padding-right: 0; overflow: visible; }
    .right { justify-content: flex-start; padding-top: 10px; }
    .preview-box { max-width: 300px; }
    .option-row, .color-row { flex-direction: column; }
}
</style>
</head>
<body>

<header>
    <a href="../index.html">←</a>
    <h1>二维码生成</h1>

</header>

<div class="content">
    <div class="left">
        <div class="form-group">
            <textarea id="qr-input" placeholder="在此输入要生成二维码的内容..." spellcheck="false"></textarea>
        </div>

        <div class="option-row">
            <div class="form-group">
                <label>尺寸</label>
                <div class="btn-group" id="sizeGroup">
                    <button class="pill" data-v="200">200</button>
                    <button class="pill active" data-v="300">300</button>
                    <button class="pill" data-v="400">400</button>
                    <button class="pill" data-v="500">500</button>
                </div>
            </div>
            <div class="form-group">
                <label>容错级别</label>
                <div class="btn-group" id="errGroup">
                    <button class="pill" data-v="L">L 7%</button>
                    <button class="pill" data-v="M">M 15%</button>
                    <button class="pill" data-v="Q">Q 25%</button>
                    <button class="pill active" data-v="H">H 30%</button>
                </div>
            </div>
        </div>

        <div class="form-group">
            <label>前景</label>
            <div class="btn-group">
                <button class="pill active" id="modeSingle">单色</button>
                <button class="pill" id="modeGrad">渐变</button>
            </div>
        </div>

        <div class="color-row">
            <div class="color-col">
                <label>前景色</label>
                <div class="color-input" id="fgPicker">
                    <div class="color-swatch" id="fg-swatch"></div>
                    <span id="fg-hex">#000000</span>
                </div>
                <input type="color" id="foreground" value="#000000" class="picker">
            </div>
            <div class="color-col">
                <label>背景色</label>
                <div class="color-input" id="bgPicker">
                    <div class="color-swatch" id="bg-swatch"></div>
                    <span id="bg-hex">#ffffff</span>
                </div>
                <input type="color" id="background" value="#ffffff" class="picker">
            </div>
        </div>

        <div class="color-row hidden" id="gradRow">
            <div class="color-col">
                <label>渐变色 1</label>
                <div class="color-input" id="g1Picker">
                    <div class="color-swatch" id="g1-swatch"></div>
                    <span id="g1-hex">#667eea</span>
                </div>
                <input type="color" id="gradient-color1" value="#667eea" class="picker">
            </div>
            <div class="color-col">
                <label>渐变色 2</label>
                <div class="color-input" id="g2Picker">
                    <div class="color-swatch" id="g2-swatch"></div>
                    <span id="g2-hex">#764ba2</span>
                </div>
                <input type="color" id="gradient-color2" value="#764ba2" class="picker">
            </div>
        </div>

        <div class="form-group">
            <label>码点样式</label>
            <div class="btn-group visual-group" id="dotsGroup">
                <button class="pill active" data-v="square"><span class="dot-icon dot-sq"></span>方形</button>
                <button class="pill" data-v="rounded"><span class="dot-icon dot-rd"></span>圆角</button>
                <button class="pill" data-v="dots"><span class="dot-icon dot-ci"></span>圆点</button>
            </div>
        </div>

        <div class="form-group">
            <label>定位图案（三个角）</label>
            <div class="btn-group visual-group" id="cornersGroup">
                <button class="pill active" data-v="square">方形</button>
                <button class="pill" data-v="extra-rounded">圆角</button>
                <button class="pill" data-v="dot">圆形</button>
            </div>
        </div>
    </div>

    <div class="right">
        <div class="preview-box" id="previewBox">
            <div id="qrcode"></div>
            <p id="hintText" class="placeholder">在上方输入内容<br>自动生成二维码</p>
        </div>
        <div id="errorMsg" class="error-msg hidden"></div>
        <div class="actions">
            <button class="secondary" id="downloadPngBtn">下载 PNG</button>
            <button class="secondary" id="downloadSvgBtn">下载 SVG</button>
            <button class="primary" id="copyBtn">复制图片</button>
        </div>
    </div>
</div>

<footer>Tool Box &copy; 2026 &middot; SuzunaCodeHime</footer>

<script src="https://cdn.jsdelivr.net/npm/qr-code-styling/lib/qr-code-styling.min.js"></script>
<script src="script.js"></script>
</body>
</html>
