<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Markdown 预览 - Tool Box</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/atom-one-dark.min.css">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">

<header>
    <a href="../index.html">←</a>
    <h1>Markdown 预览</h1>
</header>

<div class="toolbar">
    <div class="toolbar-left">
        <button id="copyMdBtn">复制 MD</button>
        <button id="copyHtmlBtn">复制 HTML</button>
        <button id="downloadMdBtn">下载 MD</button>
        <button id="downloadHtmlBtn">下载 HTML</button>
    </div>
    <div class="toolbar-right">
        <button id="clearBtn">清空</button>
    </div>
</div>

<div class="split-view">
    <div class="editor-pane">
        <textarea id="input" spellcheck="false" placeholder="在此输入 Markdown..."></textarea>
    </div>
    <div class="preview-pane">
        <div id="preview" class="preview"></div>
    </div>
</div>

<div class="status-bar">
    <span id="charCount">0</span> 字符
    <span class="sep">·</span>
    <span id="wordCount">0</span> 词
    <span class="sep">·</span>
    <span id="lineCount">0</span> 行
</div>

<footer>Tool Box &copy; 2026 &middot; SuzunaCodeHime</footer>

</div>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
<script src="script.js"></script>
</body>
</html>
