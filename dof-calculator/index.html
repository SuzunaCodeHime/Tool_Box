<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>焦平面计算器 - Tool Box</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">

<header>
    <a href="../index.html">←</a>
    <h1>焦平面计算器</h1>
</header>

<div class="form-group">
    <label for="sensor">传感器格式（弥散圆 CoC）</label>
    <select id="sensor">
        <option value="ff" selected>全画幅 (35mm) — 0.029 mm</option>
        <option value="aps-c">APS-C — 0.019 mm</option>
        <option value="m43">Micro 4/3 — 0.015 mm</option>
        <option value="1inch">1 英寸 — 0.011 mm</option>
        <option value="custom">自定义</option>
    </select>
</div>

<div class="form-group hidden" id="cocGroup">
    <label for="cocCustom">弥散圆直径 (mm)</label>
    <input id="cocCustom" type="number" value="0.020" min="0.001" max="1" step="0.001">
</div>

<div class="form-row">
    <div class="form-group">
        <label for="focal">焦距 (mm)</label>
        <input id="focal" type="number" value="50" min="1" max="10000" step="1">
    </div>
    <div class="form-group">
        <label for="aperture">光圈 (f/)</label>
        <input id="aperture" type="number" value="8" min="0.1" max="128" step="0.1">
    </div>
</div>

<div class="form-group">
    <label for="distance">对焦距离 (m)</label>
    <input id="distance" type="number" value="10" min="0.1" max="10000" step="any">
</div>

<div class="diagram-wrap">
    <div class="diagram-hint">↔ 拖拽蓝点调整对焦距离</div>
    <div class="diagram-track" id="diagramTrack">
        <div class="dof-bar" id="dofBar"></div>
        <div class="mk mk-near" id="mkNear"></div>
        <div class="mk mk-focus" id="mkFocus"></div>
        <div class="mk mk-far" id="mkFar"></div>
        <div class="mk mk-hyper" id="mkHyper"></div>
        <div class="camera-mark">📷</div>
    </div>
    <div class="legend" id="legend">
        <span class="legend-item" id="legNear"><span class="swatch swatch-n"></span>近界 <span class="val" id="legNearVal">—</span></span>
        <span class="legend-item"><span class="swatch swatch-f"></span>焦点 <span class="val" id="legFocusVal">—</span></span>
        <span class="legend-item" id="legFar"><span class="swatch swatch-r"></span>远界 <span class="val" id="legFarVal">—</span></span>
        <span class="legend-item" id="legHyper"><span class="swatch swatch-h"></span>超焦距 <span class="val" id="legHyperVal">—</span></span>
    </div>
</div>

<div class="result-panel" id="results">
    <div class="result-card full">
        <div class="value" id="hyperfocalVal">—</div>
        <div class="label">超焦距 (Hyperfocal)</div>
    </div>
    <div class="result-card">
        <div class="value" id="nearVal">—</div>
        <div class="label">近界 (Near Limit)</div>
    </div>
    <div class="result-card">
        <div class="value" id="farVal">—</div>
        <div class="label">远界 (Far Limit)</div>
    </div>
    <div class="result-card">
        <div class="value" id="totalVal">—</div>
        <div class="label">总景深 (Total DOF)</div>
    </div>
    <div class="result-card">
        <div class="value" id="frontPct">—</div>
        <div class="label">前景深占比</div>
    </div>
    <div class="result-card">
        <div class="value" id="rearPct">—</div>
        <div class="label">后景深占比</div>
    </div>
</div>

<footer>Tool Box &copy; 2026 &middot; SuzunaCodeHime</footer>

</div>

<script src="script.js"></script>
</body>
</html>
