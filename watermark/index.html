<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>照片水印添加 - Tool Box</title>
<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
    --bg: #0f1117; --bg2: #1a1c25; --bg3: #242733;
    --text: #e1e4ed; --text2: #8b8fa3;
    --accent: #6c8aff; --accent-hover: #8aa4ff;
    --border: #2e3140; --radius: 10px;
}
body {
    font-family: -apple-system, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: var(--bg); color: var(--text); min-height: 100vh; line-height: 1.6;
}
.container { max-width: 1100px; margin: 0 auto; padding: 32px 20px 60px; }

header { display: flex; align-items: center; gap: 12px; margin-bottom: 24px; }
header a { text-decoration: none; color: var(--text2); font-size: 20px; transition: color .2s; }
header a:hover { color: var(--text); }
header h1 { font-size: 20px; font-weight: 600; }

label { display: block; font-size: 13px; color: var(--text2); margin-bottom: 6px; font-weight: 500; }
input, select {
    padding: 10px 14px; border-radius: 8px; border: 1px solid var(--border);
    background: var(--bg2); color: var(--text); font-size: 14px; outline: none; font-family: inherit;
    transition: border-color .2s;
}
input:focus, select:focus { border-color: var(--accent); }
input[type="text"], input[type="number"], select { width: 100%; }
input[type="color"] { width: 44px; height: 44px; padding: 2px; cursor: pointer; border-radius: 8px; }
input[type="range"] { -webkit-appearance: none; width: 100%; height: 6px; border-radius: 3px; background: var(--bg3); outline: none; padding: 0; border: none; }
input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 18px; height: 18px; border-radius: 50%; background: var(--accent); cursor: pointer; }
input[type="file"] { display: none; }
select { cursor: pointer; }

.form-group { margin-bottom: 14px; }
.form-row { display: flex; gap: 12px; align-items: end; }
.form-row > * { flex: 1; }

.btn {
    padding: 10px 18px; border-radius: 8px; border: none;
    font-size: 14px; font-weight: 600; cursor: pointer;
    transition: background .2s, opacity .2s;
    font-family: inherit; display: inline-flex; align-items: center; gap: 6px;
}
.btn:disabled { opacity: .4; cursor: not-allowed; }
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover:not(:disabled) { background: var(--accent-hover); }
.btn-secondary { background: var(--bg3); color: var(--text); border: 1px solid var(--border); }
.btn-secondary:hover:not(:disabled) { border-color: var(--text2); }
.btn-sm { padding: 6px 12px; font-size: 12px; }
.btn-danger { background: #e5484d; color: #fff; }
.btn-danger:hover:not(:disabled) { background: #e5484d; opacity: .85; }

/* Layout */
.app-layout { display: grid; grid-template-columns: 1fr 360px; gap: 20px; align-items: start; }
@media (max-width: 860px) { .app-layout { grid-template-columns: 1fr; } }

/* Upload Zone */
.upload-zone {
    border: 2px dashed var(--border); border-radius: var(--radius);
    padding: 40px 20px; text-align: center; cursor: pointer;
    transition: border-color .2s, background .2s;
    position: relative;
}
.upload-zone:hover, .upload-zone.dragover { border-color: var(--accent); background: rgba(108,138,255,.04); }
.upload-zone .icon { font-size: 36px; margin-bottom: 8px; }
.upload-zone .hint { font-size: 13px; color: var(--text2); margin-top: 4px; }
.upload-zone .hint strong { color: var(--accent); cursor: pointer; }

/* Image List */
.img-list { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 14px; min-height: 60px; }
.img-item {
    position: relative; width: 80px; height: 80px; border-radius: 6px;
    overflow: hidden; border: 1px solid var(--border); flex-shrink: 0;
    cursor: pointer; transition: border-color .2s;
}
.img-item:hover { border-color: var(--accent); }
.img-item.active { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(108,138,255,.3); }
.img-item img { width: 100%; height: 100%; object-fit: cover; }
.img-item .del {
    position: absolute; top: 2px; right: 2px; width: 18px; height: 18px;
    border-radius: 4px; background: rgba(229,72,77,.85); color: #fff; border: none;
    font-size: 11px; cursor: pointer; display: flex; align-items: center; justify-content: center;
    opacity: 0; transition: opacity .2s; line-height: 1;
}
.img-item .dl {
    position: absolute; bottom: 2px; left: 2px; width: 18px; height: 18px;
    border-radius: 4px; background: rgba(108,138,255,.85); color: #fff; border: none;
    font-size: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center;
    opacity: 0; transition: opacity .2s; line-height: 1; backdrop-filter: blur(2px);
}
.img-item:hover .del,
.img-item:hover .dl { opacity: 1; }
.img-item .badge {
    position: absolute; bottom: 2px; right: 2px; background: rgba(0,0,0,.7);
    color: #fff; font-size: 10px; padding: 1px 5px; border-radius: 4px;
}

/* Side Panel */
.panel { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; }
.panel-title { font-size: 14px; font-weight: 600; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
.panel-section { margin-bottom: 16px; padding-bottom: 16px; border-bottom: 1px solid var(--border); }
.panel-section:last-child { margin-bottom: 0; padding-bottom: 0; border-bottom: none; }

/* Position Grid */
.pos-grid {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; max-width: 180px;
}
.pos-btn {
    width: 100%; aspect-ratio: 1; border: 1px solid var(--border); border-radius: 4px;
    background: var(--bg3); cursor: pointer; display: flex; align-items: center; justify-content: center;
    font-size: 12px; color: var(--text2); transition: all .2s;
}
.pos-btn:hover { border-color: var(--text2); }
.pos-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

.range-row { display: flex; align-items: center; gap: 10px; }
.range-row input[type="range"] { flex: 1; }
.range-row .val { font-size: 13px; color: var(--text2); min-width: 40px; text-align: right; font-variant-numeric: tabular-nums; }

/* Watermark type toggle & mode toggle */
.wm-type, .mode-toggle { display: flex; gap: 8px; margin-bottom: 12px; }
.wm-type .btn, .mode-toggle .btn { flex: 1; justify-content: center; }
.wm-type .btn.active, .mode-toggle .btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

/* Preview */
.preview-section { margin-top: 20px; }
.preview-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.preview-box { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px; }
.preview-box .label { font-size: 12px; color: var(--text2); margin-bottom: 8px; text-align: center; }
.preview-box canvas { display: block; max-width: 100%; border-radius: 4px; background: #fff; }
@media (max-width: 640px) { .preview-grid { grid-template-columns: 1fr; } }

/* Processing overlay */
.overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,.6);
    align-items: center; justify-content: center; z-index: 100;
}
.overlay.show { display: flex; }
.overlay-box {
    background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 32px; text-align: center; max-width: 360px; width: 90%;
}
.overlay-box .spinner {
    width: 40px; height: 40px; border: 3px solid var(--bg3);
    border-top-color: var(--accent); border-radius: 50%;
    animation: spin .6s linear infinite; margin: 0 auto 16px;
}
@keyframes spin { to { transform: rotate(360deg); } }

.hint-text { font-size: 12px; color: var(--text2); margin-top: 4px; }
.mt-12 { margin-top: 12px; }
.mb-12 { margin-bottom: 12px; }

/* Toast */
.toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: var(--bg3); border: 1px solid var(--border); border-radius: 8px;
    padding: 10px 20px; font-size: 13px; z-index: 200;
    animation: toastIn .3s ease; pointer-events: none;
}
@keyframes toastIn { from { opacity: 0; transform: translateX(-50%) translateY(10px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
</style>
</head>
<body>
<div class="container">

<header>
    <a href="../index.html">←</a>
    <h1>照片水印添加</h1>
</header>

<div class="app-layout">

<!-- Left: Upload & Image List -->
<div>
    <div class="upload-zone" id="dropZone">
        <div class="icon">🖼️</div>
        <div>拖拽图片到此处</div>
        <div class="hint">或 <strong id="clickTrigger">点击选择</strong> · 支持 JPG / PNG / WebP</div>
    </div>
    <input type="file" id="fileInput" accept="image/*" multiple>

    <div id="imgList" class="img-list"></div>

    <div class="preview-section" id="previewSection" style="display:none">
        <div class="panel-title">预览</div>
        <div class="preview-grid">
            <div class="preview-box">
                <div class="label">原始</div>
                <canvas id="origPreview"></canvas>
            </div>
            <div class="preview-box">
                <div class="label">水印效果</div>
                <canvas id="wmPreview"></canvas>
            </div>
        </div>
    </div>
</div>

<!-- Right: Settings Panel -->
<div class="panel">
    <div class="panel-title">⚙️ 水印设置</div>

    <!-- Watermark type -->
    <div class="panel-section">
        <label>水印类型</label>
        <div class="wm-type">
            <button class="btn btn-secondary active" data-wm="text">文字</button>
            <button class="btn btn-secondary" data-wm="image">图片</button>
            <button class="btn btn-secondary" data-wm="both">两者</button>
        </div>
    </div>

    <!-- Text settings -->
    <div class="panel-section" id="textSettings">
        <label for="wmText">文字内容</label>
        <input type="text" id="wmText" value="Watermark" placeholder="输入水印文字">

        <div class="form-row mt-12">
            <div class="form-group">
                <label for="wmFontSize">字号</label>
                <input type="number" id="wmFontSize" value="36" min="8" max="200">
            </div>
            <div class="form-group">
                <label for="wmColor">颜色</label>
                <input type="color" id="wmColor" value="#888888">
            </div>
        </div>
    </div>

    <!-- Image settings -->
    <div class="panel-section" id="imageSettings" style="display:none">
        <label>Logo 图片</label>
        <button class="btn btn-secondary btn-sm" id="uploadLogoBtn">上传 Logo</button>
        <input type="file" id="logoInput" accept="image/*">
        <div id="logoPreview" style="margin-top:8px;display:none">
            <img id="logoImg" style="max-width:100px;max-height:60px;border-radius:4px;display:block">
            <button class="btn btn-secondary btn-sm mt-12" id="removeLogoBtn">移除 Logo</button>
        </div>
    </div>

    <!-- Mode: Single / Tile -->
    <div class="panel-section">
        <label>水印模式</label>
        <div class="mode-toggle">
            <button class="btn btn-secondary active" data-mode="single">单次</button>
            <button class="btn btn-secondary" data-mode="tile">平铺 (全屏)</button>
        </div>
    </div>

    <!-- Position (single mode) -->
    <div class="panel-section" id="posSection">
        <label>位置</label>
        <div class="pos-grid" id="posGrid">
            <button class="pos-btn" data-pos="tl">↖</button>
            <button class="pos-btn" data-pos="tc">↑</button>
            <button class="pos-btn" data-pos="tr">↗</button>
            <button class="pos-btn" data-pos="cl">←</button>
            <button class="pos-btn active"  data-pos="cc">●</button>
            <button class="pos-btn" data-pos="cr">→</button>
            <button class="pos-btn" data-pos="bl">↙</button>
            <button class="pos-btn" data-pos="bc">↓</button>
            <button class="pos-btn" data-pos="br">↘</button>
        </div>
    </div>

    <!-- Tile spacing -->
    <div class="panel-section" id="tileSection" style="display:none">
        <label>平铺间距</label>
        <div class="range-row">
            <input type="range" id="tileSpacing" min="20" max="300" value="120">
            <span class="val" id="tileSpacingVal">120px</span>
        </div>
    </div>

    <!-- Opacity -->
    <div class="panel-section">
        <label>透明度</label>
        <div class="range-row">
            <input type="range" id="wmOpacity" min="0" max="100" value="50">
            <span class="val" id="opacityVal">50%</span>
        </div>
    </div>

    <!-- Scale -->
    <div class="panel-section">
        <label>缩放</label>
        <div class="range-row">
            <input type="range" id="wmScale" min="10" max="200" value="100">
            <span class="val" id="scaleVal">100%</span>
        </div>
    </div>

    <!-- Rotation -->
    <div class="panel-section">
        <label>旋转</label>
        <div class="range-row">
            <input type="range" id="wmRotate" min="0" max="360" value="0">
            <span class="val" id="rotateVal">0°</span>
        </div>
    </div>

    <!-- Export Settings -->
    <div class="panel-section">
        <label>导出设置</label>
        <div class="form-row" style="gap:8px">
            <div style="flex:1">
                <select id="exportFormat">
                    <option value="jpeg">JPEG</option>
                    <option value="png">PNG</option>
                    <option value="webp">WebP</option>
                </select>
            </div>
            <div style="flex:2">
                <div class="range-row">
                    <input type="range" id="exportQuality" min="10" max="100" value="90">
                    <span class="val" id="exportQualityVal">90%</span>
                </div>
            </div>
        </div>
        <div class="hint-text" id="exportHint">JPEG / WebP 支持品质调节</div>
    </div>

    <!-- Actions -->
    <div style="display:flex;gap:8px">
        <button class="btn btn-primary" id="applyBtn" style="flex:1" disabled>应用水印</button>
        <button class="btn btn-secondary" id="downloadBtn" style="flex:1" disabled>全部下载</button>
    </div>
    <div class="hint-text mt-12" id="statusText">请先添加图片</div>
</div>

</div>
</div>

<footer>Tool Box &copy; 2026 &middot; SuzunaCodeHime</footer>

<!-- Processing overlay -->
<div class="overlay" id="processingOverlay">
    <div class="overlay-box">
        <div class="spinner"></div>
        <div id="processingText">处理中...</div>
    </div>
</div>

<script>
// ======== State ========
const state = {
    images: [],
    currentIndex: -1,
    logoDataUrl: null,
    logoImage: null,
    wmType: 'text',
    mode: 'single',
    position: 'cc',
    tileSpacing: 120,
    opacity: 0.5,
    scale: 100,
    rotate: 0,
    text: 'Watermark',
    fontSize: 36,
    color: '#888888',
    exportFormat: 'jpeg',
    exportQuality: 90,
};

// ======== DOM ========
const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');
const imgList = document.getElementById('imgList');
const previewSection = document.getElementById('previewSection');
const origPreview = document.getElementById('origPreview');
const wmPreview = document.getElementById('wmPreview');

const wmText = document.getElementById('wmText');
const wmFontSize = document.getElementById('wmFontSize');
const wmColor = document.getElementById('wmColor');
const wmOpacity = document.getElementById('wmOpacity');
const opacityVal = document.getElementById('opacityVal');
const wmScale = document.getElementById('wmScale');
const scaleVal = document.getElementById('scaleVal');
const wmRotate = document.getElementById('wmRotate');
const rotateVal = document.getElementById('rotateVal');
const posGrid = document.getElementById('posGrid');
const posSection = document.getElementById('posSection');
const tileSection = document.getElementById('tileSection');
const tileSpacing = document.getElementById('tileSpacing');
const tileSpacingVal = document.getElementById('tileSpacingVal');
const textSettings = document.getElementById('textSettings');
const imageSettings = document.getElementById('imageSettings');
const uploadLogoBtn = document.getElementById('uploadLogoBtn');
const logoInput = document.getElementById('logoInput');
const logoPreview = document.getElementById('logoPreview');
const logoImg = document.getElementById('logoImg');
const removeLogoBtn = document.getElementById('removeLogoBtn');
const exportFormat = document.getElementById('exportFormat');
const exportQuality = document.getElementById('exportQuality');
const exportQualityVal = document.getElementById('exportQualityVal');
const exportHint = document.getElementById('exportHint');
const applyBtn = document.getElementById('applyBtn');
const downloadBtn = document.getElementById('downloadBtn');
const statusText = document.getElementById('statusText');
const processingOverlay = document.getElementById('processingOverlay');
const processingText = document.getElementById('processingText');

// ======== Toast ========
let toastTimer;
function toast(msg) {
    clearTimeout(toastTimer);
    const el = document.querySelector('.toast');
    if (el) el.remove();
    const t = document.createElement('div');
    t.className = 'toast';
    t.textContent = msg;
    document.body.appendChild(t);
    toastTimer = setTimeout(() => t.remove(), 2500);
}

// ======== Upload ========
dropZone.addEventListener('click', () => fileInput.click());
document.getElementById('clickTrigger').addEventListener('click', (e) => { e.stopPropagation(); fileInput.click(); });

dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', (e) => {
    e.preventDefault();
    dropZone.classList.remove('dragover');
    handleFiles(e.dataTransfer.files);
});

fileInput.addEventListener('change', () => { handleFiles(fileInput.files); fileInput.value = ''; });

function handleFiles(files) {
    const valid = [];
    for (const f of files) {
        if (!f.type.match(/^image\/(jpeg|png|webp)$/)) continue;
        valid.push(f);
    }
    if (!valid.length) { toast('仅支持 JPG/PNG/WebP 格式的图片'); return; }
    for (const f of valid) {
        const reader = new FileReader();
        reader.onload = (e) => {
            const img = new Image();
            img.onload = () => {
                state.images.push({ file: f, dataUrl: e.target.result, img });
                if (state.currentIndex === -1) {
                    state.currentIndex = 0;
                    updatePreview();
                }
                renderImageList();
                updateButtons();
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(f);
    }
}

function renderImageList() {
    imgList.innerHTML = '';
    state.images.forEach((item, i) => {
        const div = document.createElement('div');
        div.className = 'img-item' + (i === state.currentIndex ? ' active' : '');
        const dlBtn = item.resultDataUrl
            ? `<button class="dl" data-idx="${i}" title="下载此张">⬇</button>`
            : '';
        div.innerHTML = `
            <img src="${item.dataUrl}" alt="">
            <button class="del" data-idx="${i}">×</button>
            ${dlBtn}
        `;
        div.addEventListener('click', (e) => {
            if (e.target.tagName === 'BUTTON') return;
            state.currentIndex = i;
            renderImageList();
            updatePreview();
        });
        div.querySelector('.del').addEventListener('click', (e) => {
            e.stopPropagation();
            state.images.splice(i, 1);
            if (state.currentIndex >= state.images.length) state.currentIndex = state.images.length - 1;
            if (state.currentIndex === -1) previewSection.style.display = 'none';
            renderImageList();
            updatePreview();
            updateButtons();
        });
        const dl = div.querySelector('.dl');
        if (dl) {
            dl.addEventListener('click', (e) => {
                e.stopPropagation();
                downloadSingle(i);
            });
        }
        imgList.appendChild(div);
    });
}

// ======== Watermark Mode ========
document.querySelectorAll('[data-mode]').forEach(btn => {
    btn.addEventListener('click', () => {
        document.querySelectorAll('[data-mode]').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        state.mode = btn.dataset.mode;
        posSection.style.display = state.mode === 'single' ? '' : 'none';
        tileSection.style.display = state.mode === 'tile' ? '' : 'none';
        updatePreview();
    });
});

// ======== Tile Spacing ========
tileSpacing.addEventListener('input', () => {
    state.tileSpacing = +tileSpacing.value;
    tileSpacingVal.textContent = tileSpacing.value + 'px';
    updatePreview();
});

// ======== Watermark Type ========
document.querySelectorAll('.wm-type .btn').forEach(btn => {
    btn.addEventListener('click', () => {
        document.querySelectorAll('.wm-type .btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        state.wmType = btn.dataset.wm;
        textSettings.style.display = (state.wmType === 'text' || state.wmType === 'both') ? '' : 'none';
        imageSettings.style.display = (state.wmType === 'image' || state.wmType === 'both') ? '' : 'none';
        updatePreview();
    });
});

function loadLogoImage(dataUrl) {
    const img = new Image();
    img.onload = () => {
        state.logoImage = img;
        updatePreview();
    };
    img.src = dataUrl;
}

uploadLogoBtn.addEventListener('click', () => logoInput.click());
logoInput.addEventListener('change', () => {
    const f = logoInput.files[0];
    if (!f) return;
    if (!f.type.match(/^image\/(jpeg|png|webp)$/)) { toast('仅支持 JPG/PNG/WebP 格式'); return; }
    const reader = new FileReader();
    reader.onload = (e) => {
        state.logoDataUrl = e.target.result;
        logoImg.src = e.target.result;
        logoPreview.style.display = 'block';
        uploadLogoBtn.textContent = '更换 Logo';
        loadLogoImage(e.target.result);
    };
    reader.readAsDataURL(f);
});
removeLogoBtn.addEventListener('click', () => {
    state.logoDataUrl = null;
    state.logoImage = null;
    logoPreview.style.display = 'none';
    uploadLogoBtn.textContent = '上传 Logo';
    logoInput.value = '';
    updatePreview();
});

// ======== Position Grid ========
posGrid.querySelectorAll('.pos-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        posGrid.querySelectorAll('.pos-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        state.position = btn.dataset.pos;
        updatePreview();
    });
});

// ======== Sliders ========
wmOpacity.addEventListener('input', () => {
    state.opacity = wmOpacity.value / 100;
    opacityVal.textContent = wmOpacity.value + '%';
    updatePreview();
});
wmScale.addEventListener('input', () => {
    state.scale = +wmScale.value;
    scaleVal.textContent = wmScale.value + '%';
    updatePreview();
});
wmRotate.addEventListener('input', () => {
    state.rotate = +wmRotate.value;
    rotateVal.textContent = wmRotate.value + '°';
    updatePreview();
});

wmText.addEventListener('input', () => { state.text = wmText.value; updatePreview(); });
wmFontSize.addEventListener('input', () => { state.fontSize = +wmFontSize.value; updatePreview(); });
wmColor.addEventListener('input', () => { state.color = wmColor.value; updatePreview(); });

// ======== Export Settings ========
exportFormat.addEventListener('change', () => {
    state.exportFormat = exportFormat.value;
    exportHint.textContent = state.exportFormat === 'png' ? 'PNG 无损输出' : 'JPEG / WebP 支持品质调节';
    if (state.exportFormat === 'png') { exportQuality.disabled = true; }
    else { exportQuality.disabled = false; }
    updatePreview();
});
exportQuality.addEventListener('input', () => {
    state.exportQuality = +exportQuality.value;
    exportQualityVal.textContent = exportQuality.value + '%';
    updatePreview();
});

// ======== Canvas Drawing ========
// In single mode, sizes are scaled proportionally to the image so the
// watermark looks consistent regardless of image resolution.  The factor
// Math.min(w,h)/400 means a fontSize=36 appears ~36px on the 400px preview,
// matching the old non-WYSIWYG behavior while being correct at full size.
function getProportionalScale(w, h) {
    return Math.min(w, h) / 400;
}

function drawWatermark(ctx, w, h) {
    const hasText = state.wmType === 'text' || state.wmType === 'both';
    const hasImage = state.wmType === 'image' || state.wmType === 'both';

    if (!hasText && !hasImage) return;

    const opacity = Math.max(0, Math.min(1, state.opacity));

    if (state.mode === 'tile') {
        drawTileWatermark(ctx, w, h, hasText, hasImage, opacity);
        return;
    }

    const scale = state.scale / 100;
    const pScale = getProportionalScale(w, h);

    if (hasText && state.text.trim()) {
        const fontSize = state.fontSize * scale * pScale;
        ctx.save();
        ctx.globalAlpha = opacity;
        ctx.font = `bold ${fontSize}px sans-serif`;
        ctx.fillStyle = state.color;
        ctx.textBaseline = 'middle';
        ctx.textAlign = 'center';

        const text = state.text;
        const metrics = ctx.measureText(text);
        const tw = metrics.width;
        const th = fontSize;
        const pos = getPosition(w, h, tw, th);
        const cx = pos.x + tw / 2;
        const cy = pos.y + th / 2;

        ctx.translate(cx, cy);
        ctx.rotate(state.rotate * Math.PI / 180);
        ctx.translate(-cx, -cy);

        ctx.fillText(text, pos.x + tw / 2, pos.y + th / 2);
        ctx.restore();
    }

    if (hasImage && state.logoImage) {
        drawLogoOnCanvas(ctx, state.logoImage, w, h, opacity, pScale);
    }
}

function drawTileWatermark(ctx, w, h, hasText, hasImage, opacity) {
    const spacing = state.tileSpacing;
    const angle = state.rotate * Math.PI / 180;

    ctx.save();
    ctx.globalAlpha = opacity;

    if (hasText && state.text.trim()) {
        const fontSize = state.fontSize;
        ctx.font = `bold ${fontSize}px sans-serif`;
        ctx.fillStyle = state.color;
        ctx.textBaseline = 'middle';
        ctx.textAlign = 'center';

        const text = state.text;
        const metrics = ctx.measureText(text);
        const tw = metrics.width + spacing;
        const th = fontSize * 1.5 + spacing;

        const diag = Math.ceil(Math.sqrt(w * w + h * h));
        for (let y = -diag; y < diag + th; y += th) {
            for (let x = -diag; x < diag + tw; x += tw) {
                ctx.save();
                ctx.translate(x, y);
                ctx.rotate(angle);
                ctx.fillText(text, 0, 0);
                ctx.restore();
            }
        }
    }

    if (hasImage && state.logoImage) {
        const scale = state.scale / 100;
        let lw = state.logoImage.naturalWidth * scale;
        let lh = state.logoImage.naturalHeight * scale;
        const stepX = lw + spacing;
        const stepY = lh + spacing;

        const diag = Math.ceil(Math.sqrt(w * w + h * h));
        for (let y = -diag; y < diag + stepY; y += stepY) {
            for (let x = -diag; x < diag + stepX; x += stepX) {
                ctx.save();
                ctx.translate(x, y);
                ctx.rotate(angle);
                ctx.drawImage(state.logoImage, -lw / 2, -lh / 2, lw, lh);
                ctx.restore();
            }
        }
    }

    ctx.restore();
}

function drawLogoOnCanvas(ctx, logo, w, h, opacity, pScale) {
    if (pScale === undefined) pScale = 1;
    let lw = logo.naturalWidth * (state.scale / 100) * pScale;
    let lh = logo.naturalHeight * (state.scale / 100) * pScale;

    const maxW = w * 0.4;
    const maxH = h * 0.4;
    if (lw > maxW) { lh *= maxW / lw; lw = maxW; }
    if (lh > maxH) { lw *= maxH / lh; lh = maxH; }

    const pos = getPosition(w, h, lw, lh);
    const cx = pos.x + lw / 2;
    const cy = pos.y + lh / 2;

    ctx.save();
    ctx.globalAlpha = opacity;
    ctx.translate(cx, cy);
    ctx.rotate(state.rotate * Math.PI / 180);
    ctx.translate(-cx, -cy);
    ctx.drawImage(logo, pos.x, pos.y, lw, lh);
    ctx.restore();
}

function getPosition(canvasW, canvasH, elW, elH) {
    const margin = 20;
    switch (state.position) {
        case 'tl': return { x: margin, y: margin };
        case 'tc': return { x: (canvasW - elW) / 2, y: margin };
        case 'tr': return { x: canvasW - elW - margin, y: margin };
        case 'cl': return { x: margin, y: (canvasH - elH) / 2 };
        case 'cc': return { x: (canvasW - elW) / 2, y: (canvasH - elH) / 2 };
        case 'cr': return { x: canvasW - elW - margin, y: (canvasH - elH) / 2 };
        case 'bl': return { x: margin, y: canvasH - elH - margin };
        case 'bc': return { x: (canvasW - elW) / 2, y: canvasH - elH - margin };
        case 'br': return { x: canvasW - elW - margin, y: canvasH - elH - margin };
    }
}

// ======== Export Helpers ========
const MIME_MAP = { jpeg: 'image/jpeg', png: 'image/png', webp: 'image/webp' };
const EXT_MAP = { jpeg: '.jpg', png: '.png', webp: '.webp' };

function getExportOpts() {
    return {
        mime: MIME_MAP[state.exportFormat],
        ext: EXT_MAP[state.exportFormat],
        quality: state.exportFormat === 'png' ? undefined : state.exportQuality / 100,
    };
}

function renderFullImage(ctx, img, w, h) {
    // Fill white for JPEG (no alpha support)
    if (state.exportFormat === 'jpeg') {
        ctx.fillStyle = '#ffffff';
        ctx.fillRect(0, 0, w, h);
    }
    ctx.drawImage(img, 0, 0, w, h);
}

// ======== Preview (WYSIWYG) ========
let previewTimer;

function updatePreview() {
    clearTimeout(previewTimer);
    previewTimer = setTimeout(doUpdatePreview, 150);
}

function doUpdatePreview() {
    const idx = state.currentIndex;
    if (idx < 0 || idx >= state.images.length) { previewSection.style.display = 'none'; return; }
    previewSection.style.display = '';

    const item = state.images[idx];
    const img = item.img;
    const nw = img.naturalWidth;
    const nh = img.naturalHeight;
    const maxW = 400;
    const displayScale = Math.min(1, maxW / nw);
    const pw = Math.round(nw * displayScale);
    const ph = Math.round(nh * displayScale);

    // Original (full-size → scale down)
    const offscreen = document.createElement('canvas');
    offscreen.width = nw;
    offscreen.height = nh;
    const offCtx = offscreen.getContext('2d');
    offCtx.fillStyle = '#ffffff';
    offCtx.fillRect(0, 0, nw, nh);
    offCtx.drawImage(img, 0, 0, nw, nh);

    origPreview.width = pw;
    origPreview.height = ph;
    const octx = origPreview.getContext('2d');
    octx.drawImage(offscreen, 0, 0, nw, nh, 0, 0, pw, ph);

    // Watermarked (full-size render → scale down)
    const offWM = document.createElement('canvas');
    offWM.width = nw;
    offWM.height = nh;
    const wmCtx = offWM.getContext('2d');
    renderFullImage(wmCtx, img, nw, nh);
    drawWatermark(wmCtx, nw, nh);

    wmPreview.width = pw;
    wmPreview.height = ph;
    const wctx = wmPreview.getContext('2d');
    wctx.drawImage(offWM, 0, 0, nw, nh, 0, 0, pw, ph);
}

// ======== Apply Batch ========
applyBtn.addEventListener('click', async () => {
    if (!state.images.length) return;
    const opts = getExportOpts();
    processingOverlay.classList.add('show');
    processingText.textContent = '正在处理图片...';

    for (let i = 0; i < state.images.length; i++) {
        processingText.textContent = `正在处理第 ${i + 1}/${state.images.length} 张...`;
        const item = state.images[i];
        const img = item.img;
        const c = document.createElement('canvas');
        c.width = img.naturalWidth;
        c.height = img.naturalHeight;
        const ctx = c.getContext('2d');
        renderFullImage(ctx, img, c.width, c.height);
        drawWatermark(ctx, c.width, c.height);
        item.resultDataUrl = c.toDataURL(opts.mime, opts.quality);
        await new Promise(r => setTimeout(r, 10));
    }

    processingOverlay.classList.remove('show');
    downloadBtn.disabled = false;
    renderImageList();
    updateButtons();
    toast(`已完成 ${state.images.length} 张图片的水印处理`);
});

// ======== Download ========
function downloadSingle(index) {
    const item = state.images[index];
    if (!item || !item.resultDataUrl) { toast('请先应用水印'); return; }
    const opts = getExportOpts();
    const a = document.createElement('a');
    a.download = item.file.name.replace(/\.[^.]+$/, '_WaterMark' + opts.ext);
    a.href = item.resultDataUrl;
    a.click();
}

downloadBtn.addEventListener('click', async () => {
    const results = state.images.filter(i => i.resultDataUrl);
    if (!results.length) { toast('请先应用水印'); return; }
    const opts = getExportOpts();

    if (results.length === 1) {
        const a = document.createElement('a');
        a.download = results[0].file.name.replace(/\.[^.]+$/, '_WaterMark' + opts.ext);
        a.href = results[0].resultDataUrl;
        a.click();
        return;
    }

    processingOverlay.classList.add('show');
    processingText.textContent = '正在打包 ZIP...';
    await new Promise(r => setTimeout(r, 50));

    const JSZip = window.JSZip;
    if (!JSZip) { toast('ZIP 库加载中，请稍后重试'); processingOverlay.classList.remove('show'); return; }

    const zip = new JSZip();
    for (const item of results) {
        const name = item.file.name.replace(/\.[^.]+$/, '_WaterMark' + opts.ext);
        const data = item.resultDataUrl.split(',')[1];
        zip.file(name, data, { base64: true });
    }
    const blob = await zip.generateAsync({ type: 'blob' });
    const a = document.createElement('a');
    a.download = 'WaterMark_Images.zip';
    a.href = URL.createObjectURL(blob);
    a.click();
    URL.revokeObjectURL(a.href);
    processingOverlay.classList.remove('show');
    toast('ZIP 已下载');
});

// ======== Helpers ========
function updateButtons() {
    const hasImgs = state.images.length > 0;
    applyBtn.disabled = !hasImgs;
    const processed = state.images.filter(i => i.resultDataUrl).length;
    if (!hasImgs) downloadBtn.disabled = true;
    else downloadBtn.disabled = processed === 0;
    downloadBtn.textContent = processed === 0
        ? '全部下载'
        : `下载全部 (${processed})`;
    statusText.textContent = !hasImgs
        ? '请先添加图片'
        : processed === 0
            ? `${state.images.length} 张图片已加载`
            : `${state.images.length} 张 · ${processed} 张已处理`;
}

// ======== Init ========
updateButtons();
</script>
