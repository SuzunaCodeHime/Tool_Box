<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>照片信息查看 - Tool Box</title>
<script src="https://cdn.jsdelivr.net/npm/exifr@7.1.3/dist/full.umd.js"></script>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">

<header>
    <a href="../index.html">←</a>
    <h1>照片信息查看</h1>
</header>

<div class="upload-area" id="uploadArea">
    <input type="file" id="fileInput" accept="image/*,.cr2,.cr3,.nef,.arw,.dng,.raf,.rw2,.orf,.srw,.pef,.mrw,.dcr,.raw,.rwl,.raf,.3fr,.kdc,.mdc,.mef,.mos,.mrw,.nrw,.raw,.rwl,.sr2,.srf,.x3f">
    <div class="icon">📁</div>
    <div class="hint">点击上传或拖拽图片到此处</div>
    <div class="subhint">JPEG / WebP / TIFF / PNG / HEIF / RAW (CR2/NEF/ARW/DNG...) · 仅浏览器本地解析</div>
    <button class="sample-btn" id="sampleBtn">🖼 加载示例图片</button>
</div>

<div class="preview" id="preview">
    <img id="previewImg" alt="preview">
    <div class="file-info">
        <div class="name" id="fileName"></div>
        <div class="row" id="fileSize"></div>
        <div class="row" id="fileDim"></div>
    </div>
</div>

<div id="result"></div>

<div class="actions" id="actions" style="display:none">
    <button class="secondary" id="exportBtn">📥 导出 JSON</button>
</div>

<footer>Tool Box &copy; 2026 &middot; SuzunaCodeHime</footer>

</div>

<script src="script.js"></script>
</body>
</html>
